data:
  batch_size: 16
  color_jitter_strength: 0.5
  crop_scale:
  - 0.08
  - 1.0
  crop_size: 224
  image_folder: /home/jovyan/UCAD/mvtec2d
  num_workers: 4
  pin_mem: true
  root_path: /home/jovyan/UCAD/mvtec2d
  use_color_distortion: true
  use_gaussian_blur: true
  use_horizontal_flip: true
dataset_info:
  categories:
  - locator_tube_connector
  - insulator
  - sleeve_loose
  - insulator_SAM
  - ear_croped
  - connector_sleeve
  - casing_base
  - locator_base
  - sleeve_loose_global
  - sleeve_double_ear_crack
  - base_back_croped1
  - screw_clamp
  classes:
  - good
  - crack
  - drop
  - loose
  - crack_cs
  - crack_cb
  - crack_lb
  - loose_sdr
  - crack_sdr
  - missingcat >> configs/train/industrial_detection.yaml << 'EOF'
  num_classes: 20
  total_categories: 12
  total_samples: 5000
hardware:
  device: cuda
  gpu_memory: 8
  gradient_checkpointing: true
  mixed_precision: true
logging:
  folder: ./checkpoints/industrial_detection
mask:
  allow_overlap: false
  aspect_ratio:
  - 0.3
  - 3.0
  enc_mask_scale:
  - 0.2
  - 0.6
  min_keep: 10
  num_enc_masks: 1
  num_pred_masks: 4
  patch_size: 16
  pred_mask_scale:
  - 0.4
  - 0.8
model:
  cls_token: true
  depth: 6
  dropout: 0.1
  embed_dim: 192
  encoder: vit_tiny
  heads: 16
  mlp_dim: 2048
  pred_dim: 192
optimization:
  epochs: 100
  final_lr: 1.0e-06
  lr: 0.0001
  weight_decay: 0.05
optimizer:
  betas:
  - 0.9
  - 0.95
  eps: 1e-8
  type: adamw
output:
  log_dir: ./logs
  save_dir: ./checkpoints
  tensorboard: true
sigreg:
  sigreg_momentum: 0.995
  sigreg_temperature: 0.1
  sigreg_weight: 0.09
  use_sigreg: true
training:
  bfloat16: true
  epochs: 100
  gradient_clip: 1.0
  lr: 0.0001
  lr_scheduler: cosine
  save_every: 10
  warmup_epochs: 10
  weight_decay: 0.05
